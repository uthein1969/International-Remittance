name: Keep Supabase Alive

on:
  schedule:
    # ၅ ရက်တစ်ခါ မနက်တိုင်း Auto run အောင် သတ်မှတ်ခြင်း
    - cron: '0 0 */5 * *'
  workflow_dispatch: # ကိုယ်တိုင် လက်နဲ့ စမ်း run ချင်ရင်လည်း ရအောင် လုပ်ထားတာပါ

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
